name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: thibautjuge.com
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /var/www/vhosts/thibautjuge.com/deploy.sh
